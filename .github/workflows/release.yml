name: Release

# Triggered by a semver tag (`v2.0.0`, `v2.1.0-rc.1`, ...). Builds the
# `mcpunit` binary on five platforms and publishes a GitHub Release with
# each archive attached.
#
# Linux runners are pinned to `ubuntu-22.04` on purpose — that gives a
# glibc-2.35 floor, which is the oldest still-supported LTS. Binaries
# built there run on every newer Ubuntu / Debian 12+ / RHEL 9+ / modern
# GitHub-hosted runner without symbol-version surprises.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: mcpunit-x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: mcpunit-aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcpunit-x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcpunit-aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcpunit-x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Assert binary size budget (<= 5 MiB)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          size=$(stat -c '%s' target/${{ matrix.target }}/release/mcpunit)
          echo "mcpunit binary size: ${size} bytes"
          if [ "$size" -gt 5242880 ]; then
            echo "::error::binary exceeds 5 MiB budget"
            exit 1
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.${{ matrix.archive }} mcpunit

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/mcpunit.exe" -DestinationPath "${{ matrix.artifact }}.${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
