name: Bug report
description: Report a reproducible bug in mcpunit.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail
        you give, the faster the fix.

        **Do not use this template for security issues.** See
        [`SECURITY.md`](https://github.com/lee-to/mcpunit/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: mcpunit version
      description: Output of `mcpunit --version` or the release tag you downloaded.
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which transport does the bug happen on?
      options:
        - stdio
        - http (Streamable HTTP)
        - both / n/a
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux x86_64
        - Linux aarch64
        - macOS arm64 (Apple Silicon)
        - macOS x86_64
        - Windows x86_64
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        Exact command line you ran, plus the smallest MCP server / fixture
        that triggers the bug.
      placeholder: |
        1. Run `mcpunit test --cmd node ./broken-server.js`
        2. Observe ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: |
        Include the full terminal output or the JSON / SARIF snippet.
        Redact secrets before pasting.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Run with `--log debug` (or `RUST_LOG=mcpunit=debug`) and paste
        the relevant lines here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest released version where possible.
          required: true
